server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 修改为实际解压目录。
    root /usr/share/nginx/html/dongga;
    index index.html;

    charset utf-8;

    # Next.js 带内容哈希的静态资源可以长期缓存。
    location ^~ /_next/static/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 项目图片、字体和图标等公共资源。
    location ~* \.(?:css|js|mjs|png|jpe?g|gif|svg|webp|ico|woff2?|ttf|otf)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # 每个业务路由均导出为独立目录下的 index.html，支持直接刷新。
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # HTML 不做长期缓存，便于后续覆盖升级。
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
