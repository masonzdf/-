<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>东嘎水库工程 · 施工总进度计划（横道图）</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --foreground: #1f2937;
    --muted-foreground: #6b7280;
    --muted: #eef1f4;
    --secondary: #f1f3f6;
    --border: #e3e7ec;
    --primary: #2563eb;
    --primary-fg: #ffffff;
    --emerald: #10b981;
    --emerald-bg: #ecfdf5;
    --emerald-fg: #059669;
    --red: #ef4444;
    --red-bg: #fef2f2;
    --red-fg: #dc2626;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--foreground);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  .app { max-width: 1400px; margin: 0 auto; padding: 24px 20px 48px; }
  header.page { margin-bottom: 20px; }
  header.page h1 { font-size: 20px; font-weight: 700; }
  header.page p { color: var(--muted-foreground); font-size: 12px; margin-top: 4px; }

  /* KPI 指标卡 */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat .label { font-size: 12px; color: var(--muted-foreground); }
  .stat .value { font-size: 26px; font-weight: 700; margin-top: 6px; }
  .stat .value span { font-size: 13px; font-weight: 500; color: var(--muted-foreground); margin-left: 2px; }
  .tone-primary { color: var(--primary); }
  .tone-emerald { color: var(--emerald); }
  .tone-red { color: var(--red); }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }

  /* 工具条 */
  .toolbar { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
  .toolbar .title { font-size: 15px; font-weight: 600; }
  .legend { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--muted-foreground); flex-wrap: wrap; }
  .legend .item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 14px; height: 10px; border-radius: 3px; display: inline-block; }
  .today-swatch { width: 1px; height: 12px; background: var(--red); display: inline-block; }
  .logic-swatch { width: 20px; height: 0; border-top: 2px dashed rgba(37,99,235,.7); display: inline-block; }
  .spacer { flex: 1; }
  .toolgroup { display: flex; align-items: center; gap: 8px; }
  .total-dur { display: flex; align-items: center; gap: 6px; background: var(--secondary); border-radius: 10px; padding: 6px 12px; }
  .total-dur .lbl { font-size: 12px; color: var(--muted-foreground); }
  .total-dur .num { font-size: 15px; font-weight: 700; color: var(--primary); }
  .scale-toggle { display: flex; border: 1px solid var(--border); border-radius: 10px; padding: 2px; }
  .scale-toggle button { border: none; background: transparent; color: var(--muted-foreground); font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 7px; cursor: pointer; }
  .scale-toggle button.active { background: var(--primary); color: var(--primary-fg); }

  /* 甘特图滚动容器 */
  .gantt-scroll {
    max-height: calc(100vh - 300px);
    overflow-x: scroll; overflow-y: auto;
    border: 1px solid var(--border); border-radius: var(--radius);
    scrollbar-width: auto;
  }
  .gantt-scroll::-webkit-scrollbar { width: 10px; height: 14px; }
  .gantt-scroll::-webkit-scrollbar-track { background: rgba(238,241,244,.6); border-radius: 9999px; }
  .gantt-scroll::-webkit-scrollbar-thumb { background: rgba(107,114,128,.45); border-radius: 9999px; border: 3px solid transparent; background-clip: padding-box; }
  .gantt-scroll::-webkit-scrollbar-thumb:hover { background: rgba(107,114,128,.65); background-clip: padding-box; }

  .gantt-inner { position: relative; }

  /* 表头 */
  .thead { position: sticky; top: 0; z-index: 30; display: flex; border-bottom: 1px solid var(--border); background: var(--card); }
  .left-head { position: sticky; left: 0; z-index: 10; display: flex; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--card); }
  .col-wbs { width: 48px; padding: 8px; font-size: 12px; font-weight: 600; color: var(--muted-foreground); }
  .col-name { flex: 1; padding: 8px; font-size: 12px; font-weight: 600; color: var(--muted-foreground); }
  .col-prog { width: 64px; padding: 8px; text-align: right; font-size: 12px; font-weight: 600; color: var(--muted-foreground); }
  .time-head { flex-shrink: 0; }
  .time-head .grp { display: flex; }
  .time-head .grp-cell { border-left: 1px solid var(--border); padding: 4px 6px; text-align: center; font-size: 12px; font-weight: 600; }
  .time-head .unit { display: flex; }
  .time-head .unit-cell { border-left: 1px solid var(--border); padding: 4px 0; text-align: center; font-size: 11px; color: var(--muted-foreground); }

  /* 行 */
  .rows { position: relative; }
  .row { display: flex; align-items: center; border-bottom: 1px solid rgba(227,231,236,.6); }
  .row.lvl0 { background: rgba(241,243,246,.4); }
  .left-cell { position: sticky; left: 0; z-index: 20; display: flex; flex-shrink: 0; align-items: center; border-right: 1px solid var(--border); cursor: pointer; }
  .left-cell.lvl0 { background: var(--secondary); }
  .left-cell.lvl1 { background: var(--card); }
  .left-cell:hover { background: rgba(37,99,235,.05); }
  .left-cell .c-wbs { width: 48px; padding: 10px 8px; font-size: 12px; color: var(--muted-foreground); }
  .left-cell .c-name { flex: 1; padding: 10px 8px; }
  .left-cell .c-name.indent { padding-left: 16px; }
  .left-cell .c-name .nm { font-size: 13px; font-weight: 500; }
  .left-cell .c-name.lvl0 .nm { font-weight: 700; }
  .left-cell .c-name .meta { font-size: 11px; color: var(--muted-foreground); margin-top: 2px; }
  .left-cell .c-prog { width: 64px; padding: 10px 8px; text-align: right; }
  .badge { border-radius: 6px; padding: 1px 6px; font-size: 11px; font-weight: 500; }
  .b-done { background: var(--emerald-bg); color: var(--emerald-fg); }
  .b-doing { background: rgba(37,99,235,.1); color: var(--primary); }
  .b-todo { background: var(--secondary); color: var(--muted-foreground); }
  .b-delay { background: var(--red-bg); color: var(--red-fg); }

  .track { position: relative; flex-shrink: 0; height: 64px; }
  .bar { position: absolute; top: 50%; transform: translateY(-50%); height: 18px; border-radius: 5px; display: flex; align-items: center; overflow: hidden; }
  .bar .fill { height: 100%; border-radius: 5px; }
  .bar.lvl0 { height: 12px; opacity: .9; }
  .bar-done { background: var(--emerald-bg); } .bar-done .fill { background: var(--emerald); }
  .bar-doing { background: rgba(37,99,235,.2); } .bar-doing .fill { background: var(--primary); }
  .bar-todo { background: var(--secondary); } .bar-todo .fill { background: rgba(107,114,128,.4); }
  .bar-delay { background: var(--red-bg); } .bar-delay .fill { background: var(--red); }
  .milestone { position: absolute; top: 50%; width: 12px; height: 12px; background: #f59e0b; transform: translate(-50%,-50%) rotate(45deg); border: 1px solid #d97706; }

  .today-line { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--red); z-index: 10; pointer-events: none; }
  .logic-svg { position: absolute; left: 0; top: 0; z-index: 15; pointer-events: none; }

  /* 弹窗 */
  .overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .overlay.open { display: flex; }
  .dialog { background: var(--card); border-radius: 14px; width: 560px; max-width: 100%; max-height: 90vh; overflow-y: auto; }
  .dialog .dhead { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .dialog .dhead h3 { font-size: 16px; font-weight: 700; }
  .dialog .dhead button { border: none; background: transparent; font-size: 20px; cursor: pointer; color: var(--muted-foreground); }
  .dialog .dbody { padding: 16px 20px; }
  .drow { display: flex; padding: 8px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
  .drow .k { width: 120px; color: var(--muted-foreground); flex-shrink: 0; }
  .drow .v { flex: 1; font-weight: 500; }
  .sec-title { font-size: 12px; font-weight: 700; margin: 14px 0 4px; display: flex; align-items: center; gap: 8px; }
  .sec-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .footer-note { margin-top: 16px; font-size: 12px; color: var(--muted-foreground); text-align: center; }
</style>
</head>
<body>
<div class="app">
  <header class="page">
    <h1>东嘎水库工程 · 施工总进度计划</h1>
    <p>以横道图（甘特图）方式管理工程施工总进度计划，按 WBS 分解跟踪各分部分项工程的计划工期与实际进度 · 离线快照</p>
  </header>

  <section class="stats" id="stats"></section>

  <section class="panel">
    <div class="toolbar">
      <span class="title">施工总进度横道图（WBS）</span>
      <div class="legend">
        <span class="item"><span class="swatch bar-doing" style="background:var(--primary)"></span>进行中</span>
        <span class="item"><span class="swatch" style="background:var(--emerald)"></span>已完成</span>
        <span class="item"><span class="swatch" style="background:rgba(107,114,128,.4)"></span>未开始</span>
        <span class="item"><span class="swatch" style="background:var(--red)"></span>已延误</span>
        <span class="item"><span class="milestone" style="position:static;transform:rotate(45deg);display:inline-block"></span>里程碑</span>
        <span class="item"><span class="today-swatch"></span>今日</span>
        <span class="item"><span class="logic-swatch"></span>逻辑关系线</span>
      </div>
      <span class="spacer"></span>
      <div class="toolgroup">
        <div class="total-dur">
          <span class="lbl">计划总工期</span>
          <span class="num" id="totalDur">0</span>
          <span class="lbl">天</span>
        </div>
        <div class="scale-toggle">
          <button id="btnMonth" class="active" onclick="setScale('month')">月</button>
          <button id="btnWeek" onclick="setScale('week')">周</button>
        </div>
      </div>
    </div>

    <div class="gantt-scroll">
      <div class="gantt-inner" id="gantt"></div>
    </div>
  </section>

  <p class="footer-note">本文件为静态离线快照，双击工作项可查看计划详情。数据截至生成时刻。</p>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeDialog()">
  <div class="dialog">
    <div class="dhead"><h3 id="dTitle">计划详情</h3><button onclick="closeDialog()">&times;</button></div>
    <div class="dbody" id="dBody"></div>
  </div>
</div>

<script>
/* ================= 数据 ================= */
var TODAY = new Date(2026, 6, 15); // 2026-07-15
var planTasks = [
  {id:"1",wbs:"1",name:"施工准备与临建工程",level:0,start:"2025-01",end:"2025-04",progress:100,status:"已完成",owner:"项目部",duration:"4 个月"},
  {id:"1.1",wbs:"1.1",name:"场地平整与施工道路",level:1,start:"2025-01",end:"2025-02",progress:100,status:"已完成",owner:"中国水电基础局",duration:"2 个月"},
  {id:"1.2",wbs:"1.2",name:"施工营地与供电供水",level:1,start:"2025-02",end:"2025-04",progress:100,status:"已完成",owner:"中国水电基础局",duration:"3 个月"},
  {id:"2",wbs:"2",name:"导流与基础处理工程",level:0,start:"2025-04",end:"2025-11",progress:82,status:"进行中",owner:"施工一标",duration:"8 个月"},
  {id:"2.1",wbs:"2.1",name:"导流洞开挖与衬砌",level:1,start:"2025-04",end:"2025-08",progress:100,status:"已完成",owner:"中国水电基础局",duration:"5 个月"},
  {id:"2.2",wbs:"2.2",name:"围堰填筑与截流",level:1,start:"2025-07",end:"2025-09",progress:100,status:"已完成",owner:"中国水电基础局",duration:"3 个月",milestone:true},
  {id:"2.3",wbs:"2.3",name:"坝基开挖与固结灌浆",level:1,start:"2025-09",end:"2025-11",progress:60,status:"进行中",owner:"中国水电基础局",duration:"3 个月",planStart:"2025-09-01",latestStart:"2025-09-15",planFinish:"2025-11-30",latestFinish:"2025-12-15",predecessors:["2.2"],successors:["3.1"]},
  {id:"3",wbs:"3",name:"挡水大坝主体工程",level:0,start:"2025-11",end:"2027-08",progress:28,status:"进行中",owner:"施工一标",duration:"22 个月"},
  {id:"3.1",wbs:"3.1",name:"坝体填筑（一期）",level:1,start:"2025-11",end:"2026-06",progress:35,status:"进行中",owner:"中国水电基础局",duration:"8 个月",planStart:"2025-11-01",latestStart:"2025-11-20",planFinish:"2026-06-30",latestFinish:"2026-07-20",predecessors:["2.3"],successors:["3.2","3.3"]},
  {id:"3.2",wbs:"3.2",name:"防渗墙与心墙施工",level:1,start:"2026-03",end:"2026-10",progress:0,status:"未开始",owner:"中国水电基础局",duration:"8 个月"},
  {id:"3.3",wbs:"3.3",name:"坝体填筑（二期）",level:1,start:"2026-08",end:"2027-05",progress:0,status:"未开始",owner:"中国水电基础局",duration:"10 个月"},
  {id:"3.4",wbs:"3.4",name:"坝顶结构与防浪墙",level:1,start:"2027-05",end:"2027-08",progress:0,status:"未开始",owner:"中国水电基础局",duration:"4 个月",milestone:true},
  {id:"4",wbs:"4",name:"溢洪道与泄水建筑物",level:0,start:"2026-01",end:"2027-06",progress:12,status:"已延误",owner:"施工一标",duration:"18 个月"},
  {id:"4.1",wbs:"4.1",name:"溢洪道引渠开挖",level:1,start:"2026-01",end:"2026-05",progress:40,status:"已延误",owner:"中国水电基础局",duration:"5 个月"},
  {id:"4.2",wbs:"4.2",name:"控制段与泄槽混凝土",level:1,start:"2026-05",end:"2027-02",progress:0,status:"未开始",owner:"中国水电基础局",duration:"10 个月"},
  {id:"4.3",wbs:"4.3",name:"消力池与出口整治",level:1,start:"2027-01",end:"2027-06",progress:0,status:"未开始",owner:"中国水电基础局",duration:"6 个月"},
  {id:"5",wbs:"5",name:"疏水管道与输配水工程",level:0,start:"2026-06",end:"2028-03",progress:5,status:"未开始",owner:"施工二标",duration:"22 个月"},
  {id:"5.1",wbs:"5.1",name:"取水口与进水塔",level:1,start:"2026-06",end:"2027-03",progress:8,status:"进行中",owner:"中铁二十一局",duration:"10 个月"},
  {id:"5.2",wbs:"5.2",name:"输水管道敷设",level:1,start:"2027-02",end:"2027-11",progress:0,status:"未开始",owner:"中铁二十一局",duration:"10 个月"},
  {id:"5.3",wbs:"5.3",name:"配水管网与附属设施",level:1,start:"2027-10",end:"2028-03",progress:0,status:"未开始",owner:"中铁二十一局",duration:"6 个月"},
  {id:"6",wbs:"6",name:"金属结构与机电安装",level:0,start:"2027-06",end:"2028-08",progress:0,status:"未开始",owner:"施工二标",duration:"15 个月"},
  {id:"6.1",wbs:"6.1",name:"闸门与启闭机安装",level:1,start:"2027-06",end:"2027-12",progress:0,status:"未开始",owner:"中铁二十一局",duration:"7 个月"},
  {id:"6.2",wbs:"6.2",name:"机电设备与自动化",level:1,start:"2027-12",end:"2028-08",progress:0,status:"未开始",owner:"中铁二十一局",duration:"9 个月"},
  {id:"7",wbs:"7",name:"蓄水验收与竣工",level:0,start:"2028-08",end:"2029-06",progress:0,status:"未开始",owner:"项目部",duration:"11 个月"},
  {id:"7.1",wbs:"7.1",name:"下闸蓄水阶段验收",level:1,start:"2028-08",end:"2028-11",progress:0,status:"未开始",owner:"项目部",duration:"4 个月",milestone:true},
  {id:"7.2",wbs:"7.2",name:"工程扫尾与竣工验收",level:1,start:"2028-11",end:"2029-06",progress:0,status:"未开始",owner:"项目部",duration:"8 个月",milestone:true}
];
var stats = [
  {label:"总体进度",value:"34.6",unit:"%",tone:"tone-primary"},
  {label:"已完成任务",value:"5",unit:"项",tone:"tone-emerald"},
  {label:"进行中任务",value:"6",unit:"项",tone:"tone-primary"},
  {label:"延误任务",value:"2",unit:"项",tone:"tone-red"}
];
var statusClass = {已完成:{badge:"b-done",bar:"bar-done"},进行中:{badge:"b-doing",bar:"bar-doing"},未开始:{badge:"b-todo",bar:"bar-todo"},已延误:{badge:"b-delay",bar:"bar-delay"}};

/* ================= 时间轴模型 ================= */
var MS_DAY = 86400000;
var LEFT_W = 280, ROW_H = 64, monthColW = 44, weekColW = 30;
var startYear = 2025, startMonth = 1, monthCount = 24;
var months = [];
(function(){ var y=startYear,m=startMonth; for(var i=0;i<monthCount;i++){ months.push({year:y,month:m}); m++; if(m>12){m=1;y++;} } })();
var totalMonths = months.length;
var rangeStart = new Date(startYear, startMonth-1, 1);
var lastM = months[months.length-1];
var rangeEnd = new Date(lastM.year, lastM.month, 0);
// 周锚点（范围起始周的周一）
var weekAnchor = (function(){ var d=new Date(rangeStart); var dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow); return d; })();
var weeks = (function(){ var arr=[]; var cur=new Date(weekAnchor); while(cur<=rangeEnd){ arr.push({start:new Date(cur),year:cur.getFullYear(),month:cur.getMonth()+1,day:cur.getDate()}); cur.setDate(cur.getDate()+7);} return arr; })();

var scale = "month";
function timelineWidth(){ return scale==="week" ? weeks.length*weekColW : totalMonths*monthColW; }

function xForDate(date){
  if(scale==="week"){ var days=(date.getTime()-weekAnchor.getTime())/MS_DAY; return days*weekColW/7; }
  var y=date.getFullYear(), m=date.getMonth();
  var idx=-1; for(var i=0;i<months.length;i++){ if(months[i].year===y&&months[i].month===m+1){idx=i;break;} }
  if(idx<0) return date.getTime()<rangeStart.getTime()?0:totalMonths*monthColW;
  var dim=new Date(y,m+1,0).getDate();
  return (idx+(date.getDate()-1)/dim)*monthColW;
}
function monthIdx(ym){ for(var i=0;i<months.length;i++){ if(ym===(months[i].year+"-"+String(months[i].month).padStart(2,"0"))) return i; } return -1; }
function taskStartDate(t){ if(t.planStart)return new Date(t.planStart); var i=Math.max(0,monthIdx(t.start)); return new Date(months[i].year,months[i].month-1,1); }
function taskEndDate(t){ if(t.planFinish)return new Date(t.planFinish); var e=monthIdx(t.end); var m=months[e<0?totalMonths-1:e]; return new Date(m.year,m.month,0); }
function barFor(t){ var l=xForDate(taskStartDate(t)); var e=xForDate(new Date(taskEndDate(t).getTime()+MS_DAY)); return {left:l,width:Math.max(6,e-l)}; }

/* ================= 渲染 ================= */
function renderStats(){
  var html="";
  stats.forEach(function(s){ html+='<div class="stat"><div class="label">'+s.label+'</div><div class="value '+s.tone+'">'+s.value+'<span>'+(s.unit||"")+'</span></div></div>'; });
  document.getElementById("stats").innerHTML=html;
}

function renderTotalDur(){
  var min=Infinity,max=-Infinity;
  planTasks.forEach(function(t){ min=Math.min(min,taskStartDate(t).getTime()); max=Math.max(max,taskEndDate(t).getTime()); });
  var days=Math.floor((max-min)/MS_DAY)+1;
  document.getElementById("totalDur").textContent=days;
}

function renderHeadTime(){
  var w=timelineWidth(), html='';
  if(scale==="month"){
    var groups=[]; months.forEach(function(m){ var last=groups[groups.length-1]; if(last&&last.year===m.year)last.count++; else groups.push({year:m.year,count:1}); });
    html+='<div class="grp">'; groups.forEach(function(g){ html+='<div class="grp-cell" style="width:'+(g.count*monthColW)+'px">'+g.year+' 年</div>'; }); html+='</div>';
    html+='<div class="unit">'; months.forEach(function(m){ html+='<div class="unit-cell" style="width:'+monthColW+'px">'+m.month+'</div>'; }); html+='</div>';
  } else {
    var wg=[]; weeks.forEach(function(w2){ var last=wg[wg.length-1]; if(last&&last.year===w2.year&&last.month===w2.month)last.count++; else wg.push({year:w2.year,month:w2.month,count:1}); });
    html+='<div class="grp">'; wg.forEach(function(g){ html+='<div class="grp-cell" style="width:'+(g.count*weekColW)+'px">'+g.year+'/'+g.month+'</div>'; }); html+='</div>';
    html+='<div class="unit">'; weeks.forEach(function(w2){ html+='<div class="unit-cell" style="width:'+weekColW+'px">'+w2.day+'</div>'; }); html+='</div>';
  }
  return '<div class="time-head" style="width:'+w+'px">'+html+'</div>';
}

function logicPaths(){
  var pos={};
  planTasks.forEach(function(t,i){ var b=barFor(t); pos[t.id]={x0:LEFT_W+b.left,x1:LEFT_W+b.left+b.width,y:i*ROW_H+ROW_H/2}; });
  var edges={};
  planTasks.forEach(function(t){
    (t.predecessors||[]).forEach(function(p){ if(pos[p])edges[p+"->"+t.id]={from:p,to:t.id}; });
    (t.successors||[]).forEach(function(s){ if(pos[s])edges[t.id+"->"+s]={from:t.id,to:s}; });
  });
  var paths=[];
  Object.keys(edges).forEach(function(k){
    var a=pos[edges[k].from], b=pos[edges[k].to]; if(!a||!b)return;
    var stub=10,back=12,sx=a.x1,sy=a.y,tx=b.x0,ty=b.y,midY=(sy+ty)/2;
    var d="M "+sx+" "+sy+" L "+(sx+stub)+" "+sy;
    if(tx>=sx+stub+back){ d+=" L "+(sx+stub)+" "+ty+" L "+tx+" "+ty; }
    else { d+=" L "+(sx+stub)+" "+midY+" L "+(tx-back)+" "+midY+" L "+(tx-back)+" "+ty+" L "+tx+" "+ty; }
    paths.push(d);
  });
  return paths;
}

function render(){
  document.getElementById("btnMonth").className = scale==="month"?"active":"";
  document.getElementById("btnWeek").className = scale==="week"?"active":"";
  var w=timelineWidth();
  var totalW=LEFT_W+w;
  var html='<div style="min-width:100%;width:'+totalW+'px">';
  // 表头
  html+='<div class="thead"><div class="left-head" style="width:'+LEFT_W+'px"><div class="col-wbs">WBS</div><div class="col-name">工作项</div><div class="col-prog">进度</div></div>'+renderHeadTime()+'</div>';
  // 行区（相对定位容器）
  html+='<div class="rows" style="position:relative">';
  // 今日线
  var tx=xForDate(TODAY);
  if(tx>0&&tx<w){ html+='<div class="today-line" style="left:'+(LEFT_W+tx)+'px"></div>'; }
  // 逻辑线 SVG
  var paths=logicPaths();
  if(paths.length){
    html+='<svg class="logic-svg" width="'+totalW+'" height="'+(planTasks.length*ROW_H)+'"><defs><marker id="arw" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="rgba(37,99,235,.7)"/></marker></defs>';
    paths.forEach(function(d){ html+='<path d="'+d+'" fill="none" stroke="rgba(37,99,235,.7)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arw)"/>'; });
    html+='</svg>';
  }
  // 数据行
  planTasks.forEach(function(t){
    var sc=statusClass[t.status], b=barFor(t);
    var lvl0=t.level===0;
    html+='<div class="row '+(lvl0?"lvl0":"")+'">';
    html+='<div class="left-cell '+(lvl0?"lvl0":"lvl1")+'" style="width:'+LEFT_W+'px" ondblclick="openDialog(\''+t.id+'\')" title="双击查看计划详情">';
    html+='<div class="c-wbs">'+t.wbs+'</div>';
    html+='<div class="c-name '+(lvl0?"lvl0":"")+' '+(t.level===1?"indent":"")+'"><div class="nm">'+t.name+(t.milestone?' <span style="color:#d97706">◆</span>':'')+'</div><div class="meta">'+t.owner+' · '+t.duration+'</div></div>';
    html+='<div class="c-prog"><span class="badge '+sc.badge+'">'+t.progress+'%</span></div>';
    html+='</div>';
    // 横道条
    html+='<div class="track" style="width:'+w+'px">';
    if(t.milestone && t.progress===0){
      html+='<div class="milestone" style="left:'+(b.left)+'px"></div>';
    } else {
      html+='<div class="bar '+(lvl0?"lvl0":"")+' '+sc.bar+'" style="left:'+b.left+'px;width:'+b.width+'px"><div class="fill" style="width:'+t.progress+'%"></div></div>';
      if(t.milestone){ html+='<div class="milestone" style="left:'+(b.left+b.width)+'px"></div>'; }
    }
    html+='</div></div>';
  });
  html+='</div></div>';
  document.getElementById("gantt").innerHTML=html;
}

/* ================= 弹窗 ================= */
function fmtLink(ids){ if(!ids||!ids.length)return "—"; return ids.map(function(id){ var t=planTasks.find(function(x){return x.id===id}); return t?(t.wbs+" "+t.name):id; }).join("；"); }
function openDialog(id){
  var t=planTasks.find(function(x){return x.id===id}); if(!t)return;
  document.getElementById("dTitle").textContent="计划详情 · "+t.name;
  var rows=[
    ["WBS 编号",t.wbs],["工作项",t.name],["层级",t.level===0?"分部工程":"分项/单元工程"],
    ["责任单位",t.owner],["状态",t.status],["完成进度",t.progress+"%"],["计划工期",t.duration]
  ];
  var html=rows.map(function(r){ return '<div class="drow"><div class="k">'+r[0]+'</div><div class="v">'+r[1]+'</div></div>'; }).join("");
  html+='<div class="sec-title">计划时间参数</div>';
  var times=[["计划开工日期",t.planStart||"—"],["最晚开工日期",t.latestStart||"—"],["计划完工日期",t.planFinish||"—"],["最晚完工日期",t.latestFinish||"—"]];
  html+=times.map(function(r){ return '<div class="drow"><div class="k">'+r[0]+'</div><div class="v">'+r[1]+'</div></div>'; }).join("");
  html+='<div class="sec-title">逻辑关系</div>';
  html+='<div class="drow"><div class="k">紧前工作</div><div class="v">'+fmtLink(t.predecessors)+'</div></div>';
  html+='<div class="drow"><div class="k">紧后工作</div><div class="v">'+fmtLink(t.successors)+'</div></div>';
  document.getElementById("dBody").innerHTML=html;
  document.getElementById("overlay").className="overlay open";
}
function closeDialog(){ document.getElementById("overlay").className="overlay"; }
function setScale(s){ scale=s; render(); }

/* ================= 初始化 ================= */
renderStats(); renderTotalDur(); render();
</script>
